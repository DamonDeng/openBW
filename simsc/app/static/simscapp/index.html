<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>simsc</title>
  <link rel="stylesheet" href="/simscapp/styles.css">
</head>
<body>
  <!-- Boot: no-key screen -->
  <div id="need-key" class="hidden">
    <main>
      <div class="card">
        <p id="need-key-msg" class="meta"></p>
        <label class="form-label" id="key-input-label" for="key-input"></label>
        <input type="text" id="key-input" placeholder="sk-…" autocomplete="off" style="width:100%">
        <div style="margin-top: 8px">
          <button id="key-save-btn" class="primary"></button>
        </div>
      </div>
    </main>
  </div>

  <!-- App shell (shown once key is loaded) -->
  <div id="app" class="hidden">
    <header>
      <h1 id="app-title">simsc</h1>
      <div class="right">
        <span id="welcome-line"></span>
        <select id="lang-select"></select>
        <button id="sign-out-btn"></button>
      </div>
    </header>
    <nav>
      <button id="tab-games" class="active" data-tab="games"></button>
      <button id="tab-keys"  data-tab="keys"></button>
    </nav>
    <main>
      <div id="view-games"></div>
      <div id="view-keys" class="hidden"></div>
      <div id="error-box" class="error hidden"></div>
    </main>
  </div>

  <!-- Modals target -->
  <div id="modal-root"></div>

  <script src="/simscapp/i18n.js"></script>
  <script src="/simscapp/app.js"></script>
</body>
</html>
